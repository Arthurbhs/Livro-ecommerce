<!DOCTYPE html>
<html>

</head>
<body>

<button id="btn">Gerar Cartão</button>
<p id="status"></p>

<script>
window.onload = function () {
  const status = document.getElementById("status");

  document.getElementById("btn").onclick = async function () {
    status.innerText = "Gerando cartão...";

    try {
      const card = await PagSeguro.encryptCard({
        publicKey: "MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAjc9x6d8qU4hYphJN38Y/9xIbZVrqIfR1lmKMoKzdscIMnajZ0gwN1ho4ZlxmtOFVywqLIIajSyVb5D0benZhHvcn+cBH9JRX0W83aamkb7uFmowPRRiW8XJ15r9ohZVeZfX2c0u5KNsZfH+x6sqMqbrypNNP/K341tCVn6/jo9hJ3CdknI1hHYMRwVW3dhnXTFbf5qR+g064ItNI4Cmis+hpOcEST8XuVlQqxJxxbrEzBN1kZzAzngZPuyEk5yLU5Yc43MCSLX0AlTA87lx6MT38v47idWYvwExQ0HulCCrZn1EG4C20P5aSTuL0O9m/uT+r+pJZ9kEenM9IUVgnWQIDAQAB",

        number: "4111111111111111",
        expMonth: "12",
        expYear: "2030",
        securityCode: "123",
        holder: "Arthur Barbosa"
      });

      console.log("encryptedCard:", card.encryptedCard);

      const res = await fetch("http://localhost:3001/api/credit-card/create", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          encryptedCard: card.encryptedCard
        })
      });

      const data = await res.json();
      console.log(data);

      status.innerText = "Sucesso! Veja o console.";

    } catch (err) {
      console.error(err);
      status.innerText = "Erro! Veja o console.";
    }
  };
};
</script>

</body>
</html>
